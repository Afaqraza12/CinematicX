name: Build CinematicX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    # Randomblock1/theos-action installs Theos AND the patched SDKs reliably via its
    # own caching, avoiding the api.github.com rate-limit failures that the manual
    # install-theos + SDK download path hits on CI runners.
    - name: Setup Theos
      uses: Randomblock1/theos-action@v1

    - name: Build Tweak + Prefs (arm64 rootless)
      run: |
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: CinematicX-${{ github.sha }}.deb
        path: packages/*.deb
        retention-days: 30
