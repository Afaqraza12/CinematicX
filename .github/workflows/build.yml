name: Build CinematicX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      uses: Randomblock1/theos-action@v1
      with:
        theos-sdks: 'https://github.com/theos/sdks'
        theos-sdks-branch: 'master'

    - name: Build Tweak (arm64 rootless)
      run: |
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: CinematicX-${{ github.sha }}.deb
        path: packages/*.deb
        retention-days: 30
