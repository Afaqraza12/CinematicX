name: Build CinematicX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Install Theos
      run: |
        export THEOS=~/theos
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

    - name: Download iOS SDKs
      run: |
        git clone https://github.com/theos/sdks.git ~/theos/sdks

    - name: Build Tweak (arm64 rootless)
      run: |
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: CinematicX-${{ github.sha }}.deb
        path: packages/*.deb
        retention-days: 30
